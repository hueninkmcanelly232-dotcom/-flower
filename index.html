            },
            {
                id: "camellia",
                name: "山茶花",
                scientificName: "Camellia japonica",
                family: "山茶科",
                description: "山茶花是山茶科山茶属的常绿灌木或小乔木，花大而美丽，有红、粉、白等多种颜色，花期在冬春季。山茶花在中国文化中象征着理想的爱和谦让。",
                floweringPeriod: [11, 12, 1, 2],
                flowerLanguage: "理想的爱、谦让、坚韧",
                poems: [
                    "东园三月雨兼风，桃李飘零扫地空。唯有山茶偏耐久，绿丛又放数枝红。",
                    "花近东溪居士家，好携樽酒款携茶。"
                ],
                imageUrl: "https://p26-doubao-search-sign.byteimg.com/labis/5902287b63d8b9ec5126de583e5bac7a~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1790775682&x-signature=G72lSflR0jK2AYNE460h9Walj1E%3D"
            },
            {
                id: "narcissus",
                name: "水仙花",
                scientificName: "Narcissus tazetta var. chinensis",
                family: "石蒜科",
                description: "水仙花是石蒜科水仙属的多年生草本植物，花白色，有黄色杯状副冠，香气浓郁，花期在冬季。水仙花在中国文化中象征着纯洁和吉祥。",
                floweringPeriod: [12, 1, 2],
                flowerLanguage: "纯洁、吉祥、思念团圆",
                poems: [
                    "得水能仙天与奇，寒香寂寞动冰肌。",
                    "凌波仙子生尘袜，水上轻盈步微月。"
                ],
                imageUrl: "https://p26-doubao-search-sign.byteimg.com/labis/05ef1b598318a92d05d670c8bce62012~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1790775682&x-signature=WTwb3si9k%2BSSbCNLZ8kg6%2FUKHRk%3D"
            }
        ];

        // DOM 元素
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const uploadContainer = document.getElementById('upload-container');
        const imageUpload = document.getElementById('image-upload');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImage = document.getElementById('remove-image');
        const identifyButton = document.getElementById('identify-button');
        const loadingContainer = document.getElementById('loading-container');
        const resultContainer = document.getElementById('result-container');
        const resultContent = document.getElementById('result-content');
        const saveToRecords = document.getElementById('save-to-records');
        const noRecords = document.getElementById('no-records');
        const recordsContainer = document.getElementById('records-container');
        const monthlyContent = document.getElementById('monthly-content');
        const monthTabs = document.querySelectorAll('.month-tab');
        const bloomModal = document.getElementById('bloom-modal');
        const modalOverlay = document.getElementById('modal-overlay');
        const closeModal = document.getElementById('close-modal');
        const bloomContent = document.getElementById('bloom-content');

        // 移动端菜单切换
        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // 移动端菜单项点击
        document.querySelectorAll('.mobile-nav-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
            });
        });

        // 上传图片
        uploadContainer.addEventListener('click', () => {
            imageUpload.click();
        });

        uploadContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadContainer.classList.add('border-primary');
        });

        uploadContainer.addEventListener('dragleave', () => {
            uploadContainer.classList.remove('border-primary');
        });

        uploadContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadContainer.classList.remove('border-primary');
            
            if (e.dataTransfer.files.length > 0) {
                handleImageUpload(e.dataTransfer.files[0]);
            }
        });

        imageUpload.addEventListener('change', () => {
            if (imageUpload.files.length > 0) {
                handleImageUpload(imageUpload.files[0]);
            }
        });

        // 处理图片上传
        function handleImageUpload(file) {
            if (!file.type.match('image.*')) {
                alert('请上传图片文件！');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过 5MB！');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                previewContainer.classList.remove('hidden');
                uploadContainer.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 移除图片
        removeImage.addEventListener('click', () => {
            imagePreview.src = '';
            previewContainer.classList.add('hidden');
            uploadContainer.classList.remove('hidden');
            imageUpload.value = '';
        });

        // 识别按钮点击
        identifyButton.addEventListener('click', () => {
            previewContainer.classList.add('hidden');
            loadingContainer.classList.remove('hidden');
            
            // 模拟识别过程
            setTimeout(() => {
                loadingContainer.classList.add('hidden');
                resultContainer.classList.remove('hidden');
                
                // 随机选择一种植物作为识别结果
                const randomPlant = plantDatabase[Math.floor(Math.random() * plantDatabase.length)];
                displayIdentificationResult(randomPlant);
                
                // 保存当前识别结果，用于后续保存到花谱
                window.currentIdentificationResult = randomPlant;
            }, 2000);
        });

        // 显示识别结果
        function displayIdentificationResult(plant) {
            resultContent.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <img src="${plant.imageUrl}" alt="${plant.name}" class="w-full h-64 object-cover rounded-lg shadow-md">
                    </div>
                    <div>
                        <h4 class="text-2xl font-bold text-primary mb-2">${plant.name}</h4>
                        <p class="text-gray-600 italic mb-4">${plant.scientificName}</p>
                        <div class="mb-4">
                            <span class="font-semibold">科属：</span>
                            <span>${plant.family}</span>
                        </div>
                        <div class="mb-4">
                            <span class="font-semibold">花期：</span>
                            <span>${plant.floweringPeriod.map(month => `${month}月`).join('、')}</span>
                        </div>
                        <div class="mb-4">
                            <span class="font-semibold">花语：</span>
                            <span>${plant.flowerLanguage}</span>
                        </div>
                        <div class="mt-6">
                            <h5 class="font-semibold mb-2">植物简介</h5>
                            <p class="text-gray-700">${plant.description}</p>
                        </div>
                    </div>
                </div>
                <div class="mt-8">
                    <h5 class="text-lg font-semibold mb-4 text-primary">相关诗句</h5>
                    <div class="bg-gray-50 p-6 rounded-lg border-l-4 border-primary">
                        ${plant.poems.map(poem => `
                            <div class="mb-4 last:mb-0">
                                <p class="text-gray-700 italic">"${poem}"</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // 保存到花谱
        saveToRecords.addEventListener('click', () => {
            if (!window.currentIdentificationResult) return;
            
            // 获取用户花谱记录
            let userRecords = JSON.parse(localStorage.getItem('flowerRecords') || '[]');
            
            // 创建新记录
            const newRecord = {
                id: Date.now().toString(),
                plantId: window.currentIdentificationResult.id,
                name: window.currentIdentificationResult.name,
                scientificName: window.currentIdentificationResult.scientificName,
                imageUrl: window.currentIdentificationResult.imageUrl,
                userImage: imagePreview.src,
                dateAdded: new Date().toISOString().split('T')[0],
                floweringPeriod: window.currentIdentificationResult.floweringPeriod
            };
            
            // 添加到记录中
            userRecords.push(newRecord);
            
            // 保存到本地存储
            localStorage.setItem('flowerRecords', JSON.stringify(userRecords));
            
            // 显示成功提示
            alert('已成功保存到花谱！');
            
            // 重置识别区域
            resetIdentificationArea();
            
            // 更新花谱记录显示
            updateRecordsDisplay();
        });

        // 重置识别区域
        function resetIdentificationArea() {
            resultContainer.classList.add('hidden');
            previewContainer.classList.add('hidden');
            uploadContainer.classList.remove('hidden');
            imageUpload.value = '';
            window.currentIdentificationResult = null;
        }

        // 更新花谱记录显示
        function updateRecordsDisplay() {
            const userRecords = JSON.parse(localStorage.getItem('flowerRecords') || '[]');
            
            if (userRecords.length === 0) {
                noRecords.classList.remove('hidden');
                recordsContainer.classList.add('hidden');
                return;
            }
            
            noRecords.classList.add('hidden');
            recordsContainer.classList.remove('hidden');
            
            // 清空容器
            recordsContainer.innerHTML = '';
            
            // 添加记录卡片
            userRecords.forEach(record => {
                const recordCard = document.createElement('div');
                recordCard.className = 'w-full md:w-1/2 lg:w-1/3 px-3 mb-6';
                recordCard.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden card-hover">
                        <div class="relative">
                            <img src="${record.userImage}" alt="${record.name}" class="w-full h-48 object-cover">
                            <div class="absolute top-2 right-2 bg-white rounded-full p-1 shadow-md cursor-pointer delete-record" data-id="${record.id}">
                                <i class="fa fa-trash text-red-500 hover:text-red-600"></i>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="text-lg font-bold text-primary">${record.name}</h4>
                                    <p class="text-gray-500 text-sm italic">${record.scientificName}</p>
                                </div>
                                <button class="bloom-button bg-primary hover:bg-green-600 text-white rounded-full w-8 h-8 flex items-center justify-center transition-all duration-300" data-plant-id="${record.plantId}">
                                    <i class="fa fa-play"></i>
                                </button>
                            </div>
                            <div class="mt-4">
                                <div class="flex items-center text-sm text-gray-600">
                                    <i class="fa fa-calendar mr-2"></i>
                                    <span>记录日期：${record.dateAdded}</span>
                                </div>
                                <div class="flex items-center text-sm text-gray-600 mt-1">
                                    <i class="fa fa-leaf mr-2"></i>
                                    <span>花期：${record.floweringPeriod.map(month => `${month}月`).join('、')}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                recordsContainer.appendChild(recordCard);
            });
            
            // 添加删除记录事件
            document.querySelectorAll('.delete-record').forEach(button => {
                button.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const recordId = button.getAttribute('data-id');
                    deleteRecord(recordId);
                });
            });
            
            // 添加绽放动画事件
            document.querySelectorAll('.bloom-button').forEach(button => {
                button.addEventListener('click', () => {
                    const plantId = button.getAttribute('data-plant-id');
                    showBloomAnimation(plantId);
                });
            });
        }

        // 删除记录
        function deleteRecord(recordId) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            let userRecords = JSON.parse(localStorage.getItem('flowerRecords') || '[]');
            userRecords = userRecords.filter(record => record.id !== recordId);
            localStorage.setItem('flowerRecords', JSON.stringify(userRecords));
            
            updateRecordsDisplay();
        }

        // 显示绽放动画
        function showBloomAnimation(plantId) {
            const plant = plantDatabase.find(p => p.id === plantId);
            if (!plant) return;
            
            bloomContent.innerHTML = `
                <div class="mb-6">
                    <img src="${plant.imageUrl}" alt="${plant.name}" class="w-full h-64 object-contain bloom-image">
                </div>
                <h3 class="text-2xl font-bold text-primary mb-2">${plant.name}</h3>
                <p class="text-gray-600 italic mb-4">${plant.scientificName}</p>
                <div class="mb-4">
                    <span class="font-semibold">花语：</span>
                    <span>${plant.flowerLanguage}</span>
                </div>
                <div class="mt-6">
                    <p class="text-gray-700 italic">"${plant.poems[0]}"</p>
                </div>
            `;
            
            bloomModal.classList.remove('hidden');
            
            // 添加绽放动画
            setTimeout(() => {
                document.querySelector('.bloom-image').classList.add('animate-bloom');
            }, 100);
        }

        // 关闭模态框
        closeModal.addEventListener('click', () => {
            bloomModal.classList.add('hidden');
        });

        modalOverlay.addEventListener('click', () => {
            bloomModal.classList.add('hidden');
        });

        // 月份标签切换
        monthTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // 移除所有标签的活动状态
                monthTabs.forEach(t => t.classList.remove('active'));
                
                // 添加当前标签的活动状态
                tab.classList.add('active');
                
                // 更新月份花历内容
                const month = parseInt(tab.getAttribute('data-month'));
                updateMonthlyDisplay(month);
            });
        });

        // 更新月份花历显示
        function updateMonthlyDisplay(month) {
            // 获取当月开花的植物
            const monthPlants = plantDatabase.filter(plant => plant.floweringPeriod.includes(month));
            
            if (monthPlants.length === 0) {
                monthlyContent.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fa fa-leaf text-gray-300 text-5xl mb-4"></i>
                        <p class="text-gray-500 text-lg">${month}月暂无开花植物记录</p>
                    </div>
                `;
                return;
            }
            
            monthlyContent.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${monthPlants.map(plant => `
                        <div class="bg-white rounded-lg shadow-md overflow-hidden card-hover month-plant-card" data-plant-id="${plant.id}">
                            <img src="${plant.imageUrl}" alt="${plant.name}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <h4 class="text-lg font-bold text-primary mb-1">${plant.name}</h4>
                                <p class="text-gray-500 text-sm italic mb-3">${plant.scientificName}</p>
                                <div class="mb-3">
                                    <span class="font-semibold">科属：</span>
                                    <span class="text-gray-700">${plant.family}</span>
                                </div>
                                <div class="mb-3">
                                    <span class="font-semibold">花语：</span>
                                    <span class="text-gray-700">${plant.flowerLanguage}</span>
                                </div>
                                <div class="mt-4 pt-3 border-t border-gray-100">
                                    <p class="text-gray-600 text-sm">
                                        <i class="fa fa-quote-left text-primary mr-2"></i>
                                        ${plant.poems[0]}
                                    </p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            // 添加植物卡片点击事件
            document.querySelectorAll('.month-plant-card').forEach(card => {
                card.addEventListener('click', () => {
                    const plantId = card.getAttribute('data-plant-id');
                    showBloomAnimation(plantId);
                });
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 更新花谱记录显示
            updateRecordsDisplay();
            
            // 更新月份花历显示（默认显示当前月份）
            const currentMonth = new Date().getMonth() + 1;
            document.querySelector(`.month-tab[data-month="${currentMonth}"]`).click();
            
            // 平滑滚动
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    
                    if (targetElement) {
                        window.scrollTo({
                            top: targetElement.offsetTop - 80,
                            behavior: 'smooth'
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
